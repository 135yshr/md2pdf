version: 2

updates:
  # Go module dependency updates
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies
      - go
    open-pull-requests-limit: 5

  # GitHub Actions version updates
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    commit-message:
      prefix: "chore(ci)"
    labels:
      - dependencies
      - github-actions
    open-pull-requests-limit: 5
