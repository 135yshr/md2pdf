name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          mkdir -p dist
          GOOS=linux  GOARCH=amd64 go build -ldflags="-X github.com/135yshr/md2pdf/internal/converter.Version=${VERSION}" -o dist/md2pdf-linux-amd64    ./cmd/md2pdf
          GOOS=linux  GOARCH=arm64 go build -ldflags="-X github.com/135yshr/md2pdf/internal/converter.Version=${VERSION}" -o dist/md2pdf-linux-arm64    ./cmd/md2pdf
          GOOS=darwin GOARCH=amd64 go build -ldflags="-X github.com/135yshr/md2pdf/internal/converter.Version=${VERSION}" -o dist/md2pdf-darwin-amd64   ./cmd/md2pdf
          GOOS=darwin GOARCH=arm64 go build -ldflags="-X github.com/135yshr/md2pdf/internal/converter.Version=${VERSION}" -o dist/md2pdf-darwin-arm64   ./cmd/md2pdf
          GOOS=windows GOARCH=amd64 go build -ldflags="-X github.com/135yshr/md2pdf/internal/converter.Version=${VERSION}" -o dist/md2pdf-windows-amd64.exe ./cmd/md2pdf

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
