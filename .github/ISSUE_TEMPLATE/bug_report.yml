name: Bug Report
description: Report a reproducible bug in md2pdf
title: "fix: "
labels: [bug]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug!
        Please fill in as much detail as possible so we can reproduce and fix it quickly.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: "When I run `md2pdf document.md`, it …"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: "I expected the PDF to …"
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps and, if possible, a minimal Markdown file that triggers the bug.
      placeholder: |
        1. Create `test.md` with the following content:
           ```markdown
           # Hello
           ```mermaid
           flowchart TD
             A --> B
           ```
           ```
        2. Run `md2pdf test.md`
        3. Observe …
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error output
      description: Paste the full error message or stack trace, if any.
      render: shell

  - type: input
    id: version
    attributes:
      label: md2pdf version
      placeholder: "e.g. v0.1.0  (run `md2pdf -version`)"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux (amd64)
        - Linux (arm64)
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Versions of key dependencies.
      placeholder: |
        Go:       go1.22.2
        mmdc:     11.4.0
        Python:   3.12.3
        Playwright: 1.44.0
        Chromium: 124.0
      render: yaml

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help — screenshots, sample `.md` files, etc.
