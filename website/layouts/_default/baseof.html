<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if not .IsHome }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="icon" href="{{ "favicon.svg" | relURL }}" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  {{ partial "critical-css.html" . }}
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="{{ "css/style.css" | relURL }}"></noscript>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"></noscript>
  {{ partial "ogp.html" . }}
  {{ if hugo.IsProduction }}
  <link rel="stylesheet" href="{{ "css/consent.css" | relURL }}" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="{{ "css/consent.css" | relURL }}"></noscript>
  <script defer src="{{ "js/consent.js" | relURL }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ site.Config.Services.GoogleAnalytics.ID }}', { send_page_view: false });
    (function(){var s=document.createElement('script');s.src='https://www.googletagmanager.com/gtag/js?id={{ site.Config.Services.GoogleAnalytics.ID }}';s.async=true;
    if('requestIdleCallback' in window){requestIdleCallback(function(){document.head.appendChild(s)})}else{window.addEventListener('load',function(){document.head.appendChild(s)})}})();
  </script>
  {{ end }}
</head>
<body>
  {{ partial "header.html" . }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  {{ if hugo.IsProduction }}
  {{ partial "consent-banner.html" . }}
  {{ end }}
  <script defer src="{{ "js/main.js" | relURL }}"></script>
</body>
</html>
