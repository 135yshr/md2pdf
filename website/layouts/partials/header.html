<header class="site-header">
  <nav class="nav-inner">
    <a href="{{ "/" | relURL }}" class="nav-brand">
      <svg class="nav-logo" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      <span>md2pdf</span>
    </a>
    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links">
      {{ range .Site.Menus.main }}
      <li>
        <a href="{{ .URL }}"{{ with .Params.external }} target="_blank" rel="noopener"{{ end }}{{ if $.IsMenuCurrent "main" . }} class="active"{{ end }}>
          {{ .Name }}
          {{ with .Params.external }}<svg class="external-icon" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>{{ end }}
        </a>
      </li>
      {{ end }}
    </ul>
  </nav>
</header>
